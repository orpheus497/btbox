# PipeWire main configuration for btbox
# Configures the audio server to handle Bluetooth audio devices
# including A2DP (high quality audio), HFP/HSP (headset + mic),
# and audio from HID peripherals with built-in microphones (e.g. game controllers)

context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 ]
    default.clock.quantum       = 512
    default.clock.min-quantum   = 256
}

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    api.bluez5.*    = bluez5/libspa-bluez5
    support.*       = support/libspa-support
}

context.modules = [
    { name = libpipewire-module-rt
        args = {
            nice.level = -11
        }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-metadata }
    { name = libpipewire-module-session-manager }
]
