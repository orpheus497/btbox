# PipeWire PulseAudio Server Configuration for btbox
# Exposes Bluetooth audio (output + microphone) to the FreeBSD host
# over TCP so the host can connect as a PulseAudio client.

context.properties = {
    # Log level for debugging (0=none, 5=trace)
    #log.level = 2
}

context.modules = [
    { name = libpipewire-module-protocol-pulse
        args = {
            # Listen on TCP port 4713 for the FreeBSD host to connect
            server.address = [
                "unix:native"
                "tcp:4713"
            ]
        }
    }
]

pulse.properties = {
    # Enable both playback and recording (mic) streams
    server.address = [
        "unix:native"
        "tcp:4713"
    ]
}

stream.properties = {
    node.latency = 512/48000
    node.autoconnect = true
    resample.quality = 4
}
