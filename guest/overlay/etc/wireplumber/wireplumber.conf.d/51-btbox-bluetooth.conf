# WirePlumber 0.5.x Bluetooth configuration for btbox
# Enables all Bluetooth audio profiles and codecs

monitor.bluez.properties = {
  # Enable SBC-XQ, mSBC, and hardware volume control
  bluez5.enable-sbc-xq    = true
  bluez5.enable-msbc      = true
  bluez5.enable-hw-volume = true

  # Enable both A2DP (high quality audio) and HFP/HSP (headset/mic)
  bluez5.headset-roles = [ hsp_hs hsp_ag hfp_hf hfp_ag ]

  # Automatically switch between A2DP and HFP profiles
  bluez5.autoswitch-profile = true

  # Audio codecs to enable (ordered by preference).
  # Note: LDAC, aptX, and aptX HD are proprietary codecs. They require
  # BlueZ built with the appropriate codec support (bluez-codec-aptx and
  # bluez-codec-ldac packages on Alpine). SBC and SBC-XQ are open and
  # always available.
  bluez5.codecs = [ ldac aac aptx aptx_hd sbc sbc_xq ]

  # Enable Bluetooth audio transport roles (A2DP, BAP, HSP, HFP).
  # Note: This does not control HID/input device roles; monitor.bluez
  # handles Bluetooth audio only.
  bluez5.roles = [ a2dp_sink a2dp_source bap_sink bap_source hsp_hs hsp_ag hfp_hf hfp_ag ]
}

monitor.bluez.rules = [
  {
    matches = [ { "device.name" = "~bluez_card.*" } ]
    actions = {
      update-props = {
        # Auto-connect all Bluetooth audio profiles
        "bluez5.auto-connect"  = [ hfp_hf hsp_hs a2dp_sink a2dp_source ]
        "device.profile"       = "a2dp-sink"
      }
    }
  }

  # Match Bluetooth audio nodes for auto-connect.
  # Note: HID/input devices are not managed by WirePlumber's bluez monitor;
  # they are handled by the btbox input-relay daemon instead.
  {
    matches = [ { "node.name" = "~bluez_input.*" } ]
    actions = {
      update-props = {
        "node.autoconnect" = true
      }
    }
  }
]
