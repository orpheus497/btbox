[General]
# Name of the system
Name=btbox

# Default adapter class — Computer (Uncategorized)
# 0x000100: Allows pairing with any Bluetooth device type including
# audio (headphones, speakers), HID (keyboards, mice, game controllers),
# and other peripherals without restricting the adapter class.
Class=0x000100

# Discoverable timeout 0 = always discoverable
DiscoverableTimeout=0

# Pairable timeout 0 = always pairable
PairableTimeout=0

# Enable audio and input profiles
# Source/Sink = A2DP audio, Media/Socket = media transport,
# Input = HID devices (keyboards, mice, game controllers)
Enable=Source,Sink,Media,Socket,Input

# Fast connectable for quicker reconnection
FastConnectable=true

# Allow all Bluetooth profile UUIDs (audio + HID + generic)
# HID: 0x1124, Audio Sink: 0x110b, Audio Source: 0x110a, HFP: 0x111e
# A/V Remote Control: 0x110e
# Empty = accept all profiles
#SupportedUUIDs=

[Policy]
# AutoEnable defines if the controller should be powered on by default.
AutoEnable=true

# Reconnect on boot to previously paired devices
ReconnectAttempts=7
ReconnectIntervals=1,2,4,8,16,32,64

[Input]
# Enable the input plugin for HID devices (keyboards, mice, game controllers)
# Classic HID over Bluetooth (HIDP) and HID over GATT (HOGP/BLE)
UserspaceHID=true

# Idle timeout for HID connections in minutes (0 = never disconnect)
IdleTimeout=0
